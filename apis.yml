description: >-
  Rolls-Royce plc is a British multinational aerospace and defense company
  manufacturing aero engines (Trent series), defense propulsion, and power
  systems. Rolls-Royce does not publish a public developer API. The company
  operates supplier portals at suppliers.rolls-royce.com and maintains a
  small GitHub presence with the qc-cfd open-source repository covering
  quantum computing for computational fluid dynamics research.
